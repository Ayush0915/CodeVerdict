name: CodeVerdict CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install ruff

    - name: Lint Code
      run: |
        # Run ruff check on backend code to verify formatting and best practices
        ruff check backend/app backend/eval backend/tests --ignore E501

    - name: Run Agent Unit Tests
      run: |
        python -m unittest discover -s backend/tests -p "test_*.py"

    - name: Run Evaluation Precision/Recall Suite
      run: |
        # Runs the evaluation suite offline (using deterministic mock generation fallback)
        python backend/eval/run_eval.py
