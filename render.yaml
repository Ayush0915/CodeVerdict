services:
  - type: web
    name: codeverdict-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You will paste this in the Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # Optional — paste in Render dashboard for higher GH rate limits
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HOST
        value: "0.0.0.0"
